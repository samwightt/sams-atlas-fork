      - integration-postgres18
      - integration-sqlite
      - integration-tidb5
      - integration-tidb6
    if: always()
    steps:
      - name: Check all integration jobs passed
        run: |
          results='${{ toJSON(needs) }}'
          if echo "$results" | grep -q '"result": "failure"'; then
            echo "One or more integration jobs failed"
            exit 1
