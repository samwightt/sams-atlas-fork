name: CI - General
on:
  pull_request:
    paths-ignore:
      - 'doc/**'
      - 'ops/**'
  push:
    branches:
      - main
    paths-ignore:
      - 'doc/**'
      - 'ops/**'
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true
env:
  ATLAS_NO_UPGRADE_SUGGESTIONS: 1
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cmd/atlas/go.mod
      - name: Run linters
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          args: --verbose

  generate-cmp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cmd/atlas/go.mod
      - name: Install stringer
        run: go install golang.org/x/tools/cmd/stringer@latest
      - name: run "go generate ./..."
        run: go generate ./...
      - name: go generate cmd/atlas
        working-directory: cmd/atlas
        run: go generate ./...
      - name: Verify generated files are checked-in properly
        run: |
          status=$(git status --porcelain | grep -v "go.\(sum\|mod\)" | cat)
          if [ -n "$status" ]; then
            echo "you need to run 'go generate ./...' and commit the changes"
            echo "$status"
            exit 1
          fi

  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: [ "1.22" ]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest
      - name: Run sql tests
        working-directory: sql
        run: |
          gotestsum --junitfile junit.xml --raw-command -- go test -json -race -coverprofile=coverage.txt \
            $(go list -f '{{if or .TestGoFiles .XTestGoFiles}}{{.ImportPath}}{{end}}' ./...)
      - name: Run schemahcl tests
        working-directory: schemahcl
        run: |
          gotestsum --junitfile junit.xml --raw-command -- go test -json -race -coverprofile=coverage.txt \
            $(go list -f '{{if or .TestGoFiles .XTestGoFiles}}{{.ImportPath}}{{end}}' ./...)
      - name: Upload sql coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: sql/coverage.txt
          flags: sql
      - name: Upload schemahcl coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: schemahcl/coverage.txt
          flags: schemahcl
      - name: Upload sql test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: sql/junit.xml
          report_type: test_results
      - name: Upload schemahcl test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: schemahcl/junit.xml
          report_type: test_results

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cmd/atlas/go.mod
      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest
      - name: Run cli tests
        run: gotestsum --junitfile junit.xml --raw-command -- go test -json -race -coverprofile=coverage.txt ./...
        working-directory: cmd/atlas
      - name: Upload cli coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cmd/atlas/coverage.txt
          flags: cli
      - name: Upload cli test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: cmd/atlas/junit.xml
          report_type: test_results

  sdk:
    runs-on: ubuntu-latest
    env:
      GOCOVERDIR: /tmp/gocover
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cmd/atlas/go.mod
      - name: Install atlas binary with coverage instrumentation
        working-directory: cmd/atlas
        run: go install -cover -coverpkg=ariga.io/atlas/... .
      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest
      # Tests run twice: -coverprofile internally hijacks GOCOVERDIR so atlas
      # subprocess counters get nuked. First pass collects harness coverage
      # and JUnit; second pass (no -coverprofile) collects binary coverage.
      - name: Run sdk tests (harness coverage + JUnit)
        run: gotestsum --junitfile junit.xml --raw-command -- go test -json -race -coverprofile=coverage.txt ./atlasexec/... ./sdk/...
      - name: Run sdk tests (binary coverage)
        if: ${{ !cancelled() }}
        continue-on-error: true
        run: |
          mkdir -p "$GOCOVERDIR"
          go test ./atlasexec/... ./sdk/...
      - name: Convert binary coverage
        if: ${{ !cancelled() }}
        run: go tool covdata textfmt -i="$GOCOVERDIR" -o=bincoverage.txt
      - name: Upload sdk coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.txt
          flags: sdk
      - name: Upload sdk binary coverage
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: bincoverage.txt
          flags: sdk-binary
      - name: Upload sdk test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: junit.xml
          report_type: test_results

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: cmd/atlas/go.mod
      - name: Install gotestsum
        run: go install gotest.tools/gotestsum@latest
      - name: Run integration tests for HCL
        working-directory: internal/integration/hclsqlspec
        run: gotestsum --junitfile junit.xml --raw-command -- go test -json -race -count=2 -v -coverprofile=coverage.txt ./...
      - name: Upload integration coverage
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: internal/integration/hclsqlspec/coverage.txt
          flags: integration
      - name: Upload integration test results
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: internal/integration/hclsqlspec/junit.xml
          report_type: test_results

  dialect-integration:
    needs: [lint, generate-cmp, unit, integration]
    uses: ./.github/workflows/ci-dialect.yaml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
