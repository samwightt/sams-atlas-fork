version: "2"
linters:
  default: none
  enable:
    - goheader
    - gosec
    - revive
  settings:
    goheader:
      template: |-
        Copyright 2021-present The Atlas Authors. All rights reserved.
        This source code is licensed under the Apache 2.0 license found
        in the LICENSE file in the root directory of this source tree.
  exclusions:
    generated: lax
    presets:
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - gosec
        path: _test\.go
      - linters:
          - gosec
        path: sql/migrate/dir.go
      - linters:
          - gosec
        path: sql/mysql/inspect_oss.go
      - linters:
          - revive
        path: sql/migrate/lex.go
      - linters:
          - revive
        path: sql/internal/sqlx/diff.go
      - path: (.+)\.go$
        text: G601
      - path: (.+)\.go$
        text: G404
      - path: (.+)\.go$
        text: redefines-builtin-id
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
